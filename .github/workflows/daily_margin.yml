name: Daily Margin Fetch

on:
  schedule:
    # 03:30 UTC = 09:00 AM IST — MCX publishes daily margins before market open.
    # fetch_today.py retries every 15 min (up to 5x) so it catches data
    # published anywhere between 9:00 AM and 10:15 AM IST automatically.
    - cron: '30 3 * * 1-5'  # Mon–Fri only; MCX doesn't trade on weekends
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # Tries up to 5 times, 15 min apart (covers 9:00–10:15 AM IST).
      # Exit 0 = new data saved; exit 2 = not published yet (not a failure).
      - name: Fetch today's margin data
        id: fetch
        run: python fetch_today.py --retries 5 --wait 15
        continue-on-error: true

      # All downstream steps only run when fresh data was actually saved.
      - name: Export dashboard JSON
        if: steps.fetch.outcome == 'success'
        run: python export_json.py

      - name: Check margin change and send alert
        if: steps.fetch.outcome == 'success'
        env:
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: python alert.py

      - name: Commit and push DB + dashboard data
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "data: daily margin update $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
